services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=testpass
      - POSTGRES_USER=testuser
      - POSTGRES_DB=testdb
    ports:
      - "25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 20
