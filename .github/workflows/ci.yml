name: CI Test

on:
  push:
    branches: [ main, dev, tests ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18'

jobs:
  test:
    name: Test Build Process
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies (force fresh install)
        run: npm ci

      - name: Build core package
        run: npm run build:core

      - name: Test core package
        run: npm run test:core

      - name: Build server package
        run: npm run build:server

      - name: Generate test certificates
        run: |
          mkdir -p server/cert
          openssl req -x509 -newkey rsa:2048 -nodes -sha256 \
            -subj "/CN=localhost" \
            -keyout server/cert/server.key \
            -out server/cert/server.crt \
            -days 1

      - name: Test server package
        run: npm run test:server

  mysql-integration:
    name: MySQL Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies (force fresh install)
        run: npm ci

      - name: Build core package
        run: npm run build:core

      - name: Build server package
        run: npm run build:server

      - name: Run MySQL integration tests
        run: npm run test:db:mysql -w server

  postgres-integration:
    name: PostgreSQL Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies (force fresh install)
        run: npm ci

      - name: Build core package
        run: npm run build:core

      - name: Build server package
        run: npm run build:server

      - name: Run PostgreSQL integration tests
        run: npm run test:db:postgres -w server

  mongodb-integration:
    name: MongoDB Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies (force fresh install)
        run: npm ci

      - name: Build core package
        run: npm run build:core

      - name: Build server package
        run: npm run build:server

      - name: Run MongoDB integration tests
        run: npm run test:db:mongodb -w server

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [test, mysql-integration, postgres-integration, mongodb-integration]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies (force fresh install)
        run: npm ci

      - name: Run E2E tests
        run: npm run test:e2e -w server